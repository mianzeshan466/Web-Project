<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Matrix Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Matrix Estate (ADMIN PANEL)</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">View Site</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section class="row mb-5 text-center">
            <div class="col-md-4"><div class="p-3 bg-white border rounded"><h6>Total Listings</h6><h3 id="statTotal">0</h3></div></div>
            <div class="col-md-4"><div class="p-3 bg-white border rounded"><h6>Avg Property Price</h6><h3 id="statAvg">0</h3></div></div>
            <div class="col-md-4"><div class="p-3 bg-white border rounded"><h6>Villas Count</h6><h3 id="statVillas">0</h3></div></div>
        </section>

        <section class="bg-white p-4 rounded shadow-sm mb-5">
            <h4 id="formTitle">Add New Property Listing</h4>
            <form id="propertyForm">
                <input type="hidden" id="propertyId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Property Title</label>
                        <input type="text" id="title" class="form-control" required>
                        <div class="text-danger small d-none" id="titleErr">Title must be at least 5 characters.</div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Type</label>
                        <select id="type" class="form-select" required>
                            <option value="Apartment">Apartment</option>
                            <option value="Villa">Villa</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Price ($)</label>
                        <input type="number" id="price" class="form-control" required min="1000">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Location (City)</label>
                        <input type="text" id="location" class="form-control" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Image URL</label>
                        <input type="url" id="image" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3" id="saveBtn">Save Listing</button>
                <button type="button" class="btn btn-secondary mt-3 d-none" id="cancelBtn">Cancel Edit</button>
            </form>
        </section>

        <section class="table-responsive bg-white p-3 rounded shadow-sm">
            <h5>Manage Live Listings</h5>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Location</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
